server:
  port: 8081

spring:
  application:
    name: server-api
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://kauth.kakao.com/.well-known/jwks.json
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}   # 없으면 비워둠
      timeout: 6000

logging:
  level:
    root: INFO
    # Spring Web 흐름
    org.springframework.web: DEBUG
    # JPA SQL 로그
    org.hibernate.SQL: DEBUG
    # 필요할 때만 활성화 (Swagger 403, JWT 필터 문제 등)
    org.springframework.security: DEBUG


auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    access-token-validity: ${AUTH_ACCESS_VALIDITY}
    refresh-token-validity: ${AUTH_REFRESH_VALIDITY}

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    token-uri: https://kauth.kakao.com/oauth/token
    auth-uri: https://kauth.kakao.com/oauth/authorize

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  group-configs:
    - group: server-api
      paths-to-match: /api/**
      display-name: API Server

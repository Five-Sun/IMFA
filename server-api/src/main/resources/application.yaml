server:
  port: 8081

spring:
  application:
    name: server-api
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://kauth.kakao.com/.well-known/jwks.json
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}   # 없으면 비워둠
      timeout: 6000

logging:
  level:
    root: INFO
    # Spring Web 흐름
    org.springframework.web: DEBUG
    # JPA SQL 로그
    org.hibernate.SQL: DEBUG
    # 필요할 때만 활성화 (Swagger 403, JWT 필터 문제 등)
    org.springframework.security: DEBUG


auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    access-token-validity: ${AUTH_ACCESS_VALIDITY}
    refresh-token-validity: ${AUTH_REFRESH_VALIDITY}

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    token-uri: https://kauth.kakao.com/oauth/token
    auth-uri: https://kauth.kakao.com/oauth/authorize

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: true  # Swagger UI 활성화 여부 (기본값: true)
    path: /swagger-ui.html  # Swagger UI 접속 경로 변경 (기본값: /swagger-ui.html)
    operationsSorter: method  # API 정렬 기준 (alpha: 알파벳순, method: HTTP 메서드 순)
    tagsSorter: alpha  # 태그 정렬 방식 (alpha: 알파벳순 정렬)
    display-request-duration: true  # 요청 실행 시간 표시 여부
    doc-expansion: none  # Swagger UI에서 API 설명의 기본 펼침 상태 (none: 닫힘, list: 펼침, full: 전체 펼침)
    persistAuthorization: true  # 페이지 새로고침 후에도 Authorization 헤더 유지 여부
    defaultModelsExpandDepth: -1  # 모델 스키마의 기본 펼침 깊이 (-1이면 모델 펼쳐지지 않음)
  group-configs:
    - group: server-api
      paths-to-match:
        - /api/**
        - /dev/**
      display-name: API Server
